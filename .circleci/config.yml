version: 2.1

jobs:
  build_web:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Docker login
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build and push Docker image
          command: |
            docker build -t m9kusanagi/prisoners-arena-web:${CIRCLE_SHA1}-amd64 web/
            docker push m9kusanagi/prisoners-arena-web:${CIRCLE_SHA1}-amd64

  build_operator:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Init submodules
          command: git submodule update --init
      - run:
          name: Docker login
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build and push operator image
          no_output_timeout: 20m
          command: |
            docker build -f operator/Dockerfile -t m9kusanagi/prisoners-arena-operator:${CIRCLE_SHA1}-amd64 .
            docker push m9kusanagi/prisoners-arena-operator:${CIRCLE_SHA1}-amd64

  deploy:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - run:
          name: Update web Helm values in pub-talos-cluster
          command: |
            git clone git@github.com:MaikBuse/pub-talos-cluster.git
            cd pub-talos-cluster

            git config user.email "ci@circleci.com"
            git config user.name "CircleCI"

            IMAGE_TAG=${CIRCLE_SHA1}-amd64

            rm -f helm/prisoners-arena/web/Values.yaml
            echo 'web:' > helm/prisoners-arena/web/Values.yaml
            echo '  container:' >> helm/prisoners-arena/web/Values.yaml
            echo "    image: \"m9kusanagi/prisoners-arena-web:$IMAGE_TAG\"" >> helm/prisoners-arena/web/Values.yaml

            git add helm/prisoners-arena/web/Values.yaml
            git commit -m "chore: update prisoners-arena-web image to $IMAGE_TAG"
            git push origin main
      - run:
          name: Update operator Helm values in sec-talos-cluster
          command: |
            git clone git@github.com:MaikBuse/sec-talos-cluster.git
            cd sec-talos-cluster

            git config user.email "ci@circleci.com"
            git config user.name "CircleCI"

            IMAGE_TAG=${CIRCLE_SHA1}-amd64

            rm -f helm/prisoners-arena/operator/Values.yaml
            echo 'operator:' > helm/prisoners-arena/operator/Values.yaml
            echo '  container:' >> helm/prisoners-arena/operator/Values.yaml
            echo "    image: \"m9kusanagi/prisoners-arena-operator:$IMAGE_TAG\"" >> helm/prisoners-arena/operator/Values.yaml

            git add helm/prisoners-arena/operator/Values.yaml
            git commit -m "chore: update prisoners-arena-operator image to $IMAGE_TAG"
            git push origin main

workflows:
  build_and_deploy:
    jobs:
      - build_web:
          filters:
            branches:
              only: main
      - build_operator:
          filters:
            branches:
              only: main
      - deploy:
          requires:
            - build_web
            - build_operator
          filters:
            branches:
              only: main
